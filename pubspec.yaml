name: flutter_todo_app
description: A production-quality To-Do List application with Firebase Authentication and Realtime Database.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # # Firebase
  # firebase_core: ^2.24.2
  # firebase_auth: ^4.16.0
  # google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.1

  # HTTP for Firebase REST API
  http: ^1.2.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.0
  intl: ^0.19.0

  # Storage
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

